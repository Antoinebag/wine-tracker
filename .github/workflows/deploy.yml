name: Déploiement GitHub Pages

on:
  push:
    branches:
      - claude/main
  workflow_dispatch:

# Autorise le déploiement vers GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          # Active automatiquement GitHub Pages (source : GitHub Actions) si ce n'est pas déjà fait.
          enablement: true

      - name: Uploader l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
